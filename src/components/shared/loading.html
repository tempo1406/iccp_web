<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>ICCP Enterprise Dashboard - Loading</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#1313ec",
                        "primary-light": "#e0e0fc",
                        "primary-dark": "#0a0a8a",
                        "background-light": "#f8f8fc",
                        "background-dark": "#101022",
                        "surface-light": "#ffffff",
                        "surface-dark": "#1a1a2e",
                        "text-main": "#0d0d1b",
                        "text-muted": "#4c4c9a",
                        "border-light": "#e7e7f3",
                        "border-dark": "#2a2a40"
                    },
                    fontFamily: {
                        display: ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        DEFAULT: "0.25rem",
                        lg: "0.5rem",
                        xl: "0.75rem",
                        full: "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        /* Custom Skeleton Pulse Animation - Subtle and High-End */
        @keyframes subtle-pulse {

            0%,
            100% {
                opacity: 0.4;
            }

            50% {
                opacity: 0.7;
            }
        }

        .skeleton {
            animation: subtle-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        /* Custom Progress Bar Animation */
        @keyframes progress-crawl {
            0% {
                width: 0%;
            }

            50% {
                width: 70%;
            }

            100% {
                width: 90%;
            }
        }

        .progress-bar-animate {
            animation: progress-crawl 2s ease-out forwards;
        }

        /* Logo Pulse */
        @keyframes logo-glow {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.8;
                filter: drop-shadow(0 0 8px rgba(19, 19, 236, 0.2));
            }

            50% {
                transform: scale(1.05);
                opacity: 1;
                filter: drop-shadow(0 0 16px rgba(19, 19, 236, 0.4));
            }
        }

        .logo-pulse {
            animation: logo-glow 3s ease-in-out infinite;
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-text-main antialiased overflow-hidden h-screen flex flex-col">
    <!-- Top Progress Bar -->
    <div class="fixed top-0 left-0 right-0 h-[2px] bg-primary/10 z-50">
        <div class="h-full bg-primary progress-bar-animate shadow-[0_0_10px_rgba(19,19,236,0.5)]"></div>
    </div>
    <!-- Header -->
    <header
        class="flex items-center justify-between whitespace-nowrap border-b border-border-light dark:border-border-dark bg-surface-light dark:bg-surface-dark px-10 py-3 z-40 shrink-0 h-16">
        <div class="flex items-center gap-8">
            <div class="flex items-center gap-4 text-text-main dark:text-white">
                <div class="size-6 text-primary">
                    <span class="material-symbols-outlined !text-[24px]">token</span>
                </div>
                <h2 class="text-text-main dark:text-white text-lg font-bold leading-tight tracking-[-0.015em]">ICCP
                    Enterprise</h2>
            </div>
            <nav class="hidden md:flex items-center gap-9">
                <a class="text-text-main dark:text-white text-sm font-medium leading-normal hover:text-primary transition-colors border-b-2 border-primary pb-[2px]"
                    href="#">Dashboard</a>
                <a class="text-text-muted dark:text-slate-400 text-sm font-medium leading-normal hover:text-primary transition-colors"
                    href="#">Analytics</a>
                <a class="text-text-muted dark:text-slate-400 text-sm font-medium leading-normal hover:text-primary transition-colors"
                    href="#">Settings</a>
            </nav>
        </div>
        <div class="flex items-center justify-end gap-6">
            <label class="hidden lg:flex flex-col w-64 h-10">
                <div
                    class="flex w-full flex-1 items-stretch rounded-lg h-full bg-background-light dark:bg-background-dark border border-transparent focus-within:border-primary/50 transition-colors">
                    <div class="text-text-muted dark:text-slate-400 flex items-center justify-center pl-4">
                        <span class="material-symbols-outlined !text-[20px]">search</span>
                    </div>
                    <input
                        class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg bg-transparent text-text-main dark:text-white focus:outline-0 focus:ring-0 border-none h-full placeholder:text-text-muted dark:placeholder:text-slate-500 px-3 text-sm font-normal leading-normal"
                        placeholder="Search knowledge base..." value="" />
                </div>
            </label>
            <button
                class="flex items-center justify-center rounded-lg h-10 px-5 bg-primary hover:bg-primary-dark transition-colors text-white text-sm font-bold leading-normal tracking-[0.015em] shadow-lg shadow-primary/20">
                <span>New Chat</span>
            </button>
            <div class="relative group cursor-pointer">
                <div class="bg-center bg-no-repeat aspect-square bg-cover rounded-full size-10 ring-2 ring-transparent group-hover:ring-primary/20 transition-all"
                    data-alt="User profile avatar of a smiling man"
                    style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuD5eIs-kyNETkrsmAG7I93dw1L5j1HvxVrkvUOsFKJRQQrPvYRFd16Lqx2XYffs-tApVQuZHhrHdMrTWBY0UFy2CEs6hAZsZX-m6oBLpMQ9AeAXANdYiQTrmqXf8RGus7nQrWl1PjXd7LjxwhKRPkH7QeDqFtmlzMUFwevqPfahGbpwTIykGOcq8dXWtYrr6u38ndVGEyagexq4YXlFEQmUzYP5JzYqgslzNOWSLeWS66LrprmpXP9Rfxbq5Ud47o_LgtcXQFZF65s");'>
                </div>
                <div
                    class="absolute bottom-0 right-0 size-2.5 bg-green-500 rounded-full border-2 border-surface-light dark:border-surface-dark">
                </div>
            </div>
        </div>
    </header>
    <!-- Main Layout -->
    <div class="flex flex-1 overflow-hidden">
        <!-- Sidebar -->
        <aside
            class="w-64 bg-background-light dark:bg-surface-dark border-r border-border-light dark:border-border-dark flex flex-col justify-between py-6 shrink-0 overflow-y-auto hidden md:flex">
            <div class="flex flex-col gap-6 px-4">
                <!-- User/Org Info -->
                <div class="flex gap-3 items-center px-2">
                    <div class="bg-primary/10 flex items-center justify-center rounded-lg size-10 text-primary">
                        <span class="material-symbols-outlined">domain</span>
                    </div>
                    <div class="flex flex-col">
                        <h1 class="text-text-main dark:text-white text-sm font-semibold leading-normal">Global Corp</h1>
                        <p class="text-text-muted dark:text-slate-400 text-xs font-normal leading-normal">Enterprise
                            Plan</p>
                    </div>
                </div>
                <!-- Navigation -->
                <div class="flex flex-col gap-1">
                    <p
                        class="px-3 text-xs font-semibold text-text-muted dark:text-slate-500 uppercase tracking-wider mb-2">
                        Platform</p>
                    <a class="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-white dark:bg-white/5 shadow-sm border border-border-light dark:border-transparent group"
                        href="#">
                        <span class="material-symbols-outlined text-primary !text-[20px]">grid_view</span>
                        <p class="text-text-main dark:text-white text-sm font-medium leading-normal">Overview</p>
                    </a>
                    <a class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-black/5 dark:hover:bg-white/5 transition-colors group text-text-muted dark:text-slate-400 hover:text-text-main dark:hover:text-white"
                        href="#">
                        <span
                            class="material-symbols-outlined !text-[20px] group-hover:text-primary transition-colors">smart_toy</span>
                        <p class="text-sm font-medium leading-normal">Consulting Bots</p>
                    </a>
                    <a class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-black/5 dark:hover:bg-white/5 transition-colors group text-text-muted dark:text-slate-400 hover:text-text-main dark:hover:text-white"
                        href="#">
                        <span
                            class="material-symbols-outlined !text-[20px] group-hover:text-primary transition-colors">menu_book</span>
                        <p class="text-sm font-medium leading-normal">Knowledge Base</p>
                    </a>
                    <a class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-black/5 dark:hover:bg-white/5 transition-colors group text-text-muted dark:text-slate-400 hover:text-text-main dark:hover:text-white"
                        href="#">
                        <span
                            class="material-symbols-outlined !text-[20px] group-hover:text-primary transition-colors">group</span>
                        <p class="text-sm font-medium leading-normal">Team Access</p>
                    </a>
                </div>
                <div class="flex flex-col gap-1 mt-4">
                    <p
                        class="px-3 text-xs font-semibold text-text-muted dark:text-slate-500 uppercase tracking-wider mb-2">
                        Compliance</p>
                    <a class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-black/5 dark:hover:bg-white/5 transition-colors group text-text-muted dark:text-slate-400 hover:text-text-main dark:hover:text-white"
                        href="#">
                        <span
                            class="material-symbols-outlined !text-[20px] group-hover:text-primary transition-colors">description</span>
                        <p class="text-sm font-medium leading-normal">Audit Logs</p>
                    </a>
                </div>
            </div>
            <!-- Storage Indicator -->
            <div class="flex flex-col gap-3 px-6 mt-auto">
                <div class="flex justify-between items-end">
                    <p class="text-text-main dark:text-white text-xs font-semibold">Storage Used</p>
                    <p class="text-text-muted dark:text-slate-400 text-xs font-normal">35%</p>
                </div>
                <div class="rounded-full bg-border-light dark:bg-slate-700 h-1.5 overflow-hidden">
                    <div class="h-full rounded-full bg-primary w-[35%]"></div>
                </div>
                <button class="text-xs text-primary font-medium hover:underline text-left">Upgrade Plan</button>
            </div>
        </aside>
        <!-- Main Content Area with Skeleton Loading -->
        <main class="flex-1 bg-surface-light dark:bg-background-dark relative overflow-y-auto p-8 lg:p-12">
            <!-- Floating Logo Loader (Center Overlay) -->
            <div class="absolute inset-0 flex items-center justify-center pointer-events-none z-10">
                <div
                    class="bg-surface-light/80 dark:bg-surface-dark/80 backdrop-blur-sm p-8 rounded-2xl shadow-2xl border border-white/20 logo-pulse flex flex-col items-center gap-4">
                    <div class="text-primary">
                        <span class="material-symbols-outlined !text-[48px]">token</span>
                    </div>
                    <p class="text-text-muted dark:text-slate-400 text-xs uppercase tracking-widest font-semibold">
                        Loading Data</p>
                </div>
            </div>
            <!-- Content Container - Faded for Loading Effect -->
            <div
                class="max-w-[1200px] mx-auto flex flex-col gap-8 opacity-60 pointer-events-none select-none transition-opacity duration-500">
                <!-- Header Skeleton -->
                <div class="flex justify-between items-end mb-4">
                    <div class="space-y-3">
                        <div class="h-8 w-48 bg-slate-200 dark:bg-slate-700 rounded-md skeleton"></div>
                        <div class="h-4 w-64 bg-slate-100 dark:bg-slate-800 rounded-md skeleton"></div>
                    </div>
                    <div class="flex gap-3">
                        <div class="h-10 w-32 bg-slate-200 dark:bg-slate-700 rounded-lg skeleton"></div>
                        <div class="h-10 w-10 bg-slate-200 dark:bg-slate-700 rounded-lg skeleton"></div>
                    </div>
                </div>
                <!-- KPI Cards Skeleton -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <!-- Card 1 -->
                    <div
                        class="p-6 rounded-xl border border-border-light dark:border-border-dark bg-white dark:bg-surface-dark shadow-sm h-40 flex flex-col justify-between">
                        <div class="flex justify-between items-start">
                            <div class="h-4 w-24 bg-slate-100 dark:bg-slate-700 rounded skeleton"></div>
                            <div class="size-8 rounded-full bg-slate-100 dark:bg-slate-700 skeleton"></div>
                        </div>
                        <div class="space-y-2">
                            <div class="h-8 w-16 bg-slate-200 dark:bg-slate-600 rounded skeleton"></div>
                            <div class="h-3 w-32 bg-slate-50 dark:bg-slate-800 rounded skeleton"></div>
                        </div>
                    </div>
                    <!-- Card 2 -->
                    <div
                        class="p-6 rounded-xl border border-border-light dark:border-border-dark bg-white dark:bg-surface-dark shadow-sm h-40 flex flex-col justify-between">
                        <div class="flex justify-between items-start">
                            <div class="h-4 w-24 bg-slate-100 dark:bg-slate-700 rounded skeleton"></div>
                            <div class="size-8 rounded-full bg-slate-100 dark:bg-slate-700 skeleton"></div>
                        </div>
                        <div class="space-y-2">
                            <div class="h-8 w-20 bg-slate-200 dark:bg-slate-600 rounded skeleton"></div>
                            <div class="h-3 w-28 bg-slate-50 dark:bg-slate-800 rounded skeleton"></div>
                        </div>
                    </div>
                    <!-- Card 3 -->
                    <div
                        class="p-6 rounded-xl border border-border-light dark:border-border-dark bg-white dark:bg-surface-dark shadow-sm h-40 flex flex-col justify-between">
                        <div class="flex justify-between items-start">
                            <div class="h-4 w-24 bg-slate-100 dark:bg-slate-700 rounded skeleton"></div>
                            <div class="size-8 rounded-full bg-slate-100 dark:bg-slate-700 skeleton"></div>
                        </div>
                        <div class="space-y-2">
                            <div class="h-8 w-16 bg-slate-200 dark:bg-slate-600 rounded skeleton"></div>
                            <div class="h-3 w-36 bg-slate-50 dark:bg-slate-800 rounded skeleton"></div>
                        </div>
                    </div>
                </div>
                <!-- Main Chart/Table Section -->
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 h-full">
                    <!-- Large Chart Area -->
                    <div
                        class="lg:col-span-2 rounded-xl border border-border-light dark:border-border-dark bg-white dark:bg-surface-dark shadow-sm p-6 flex flex-col gap-6 min-h-[400px]">
                        <div class="flex justify-between items-center">
                            <div class="h-5 w-32 bg-slate-200 dark:bg-slate-700 rounded skeleton"></div>
                            <div class="h-8 w-24 bg-slate-100 dark:bg-slate-800 rounded-lg skeleton"></div>
                        </div>
                        <!-- Chart Bars Skeleton -->
                        <div class="flex items-end justify-between gap-4 flex-1 px-4 pb-2">
                            <div class="w-full bg-slate-100 dark:bg-slate-800 rounded-t-md skeleton h-[40%]"></div>
                            <div class="w-full bg-slate-100 dark:bg-slate-800 rounded-t-md skeleton h-[70%]"></div>
                            <div class="w-full bg-slate-100 dark:bg-slate-800 rounded-t-md skeleton h-[55%]"></div>
                            <div class="w-full bg-slate-100 dark:bg-slate-800 rounded-t-md skeleton h-[85%]"></div>
                            <div class="w-full bg-slate-100 dark:bg-slate-800 rounded-t-md skeleton h-[60%]"></div>
                            <div class="w-full bg-slate-100 dark:bg-slate-800 rounded-t-md skeleton h-[45%]"></div>
                            <div class="w-full bg-slate-100 dark:bg-slate-800 rounded-t-md skeleton h-[75%]"></div>
                            <div class="w-full bg-slate-100 dark:bg-slate-800 rounded-t-md skeleton h-[90%]"></div>
                        </div>
                    </div>
                    <!-- Recent Activity List -->
                    <div
                        class="lg:col-span-1 rounded-xl border border-border-light dark:border-border-dark bg-white dark:bg-surface-dark shadow-sm p-6 flex flex-col gap-5">
                        <div class="h-5 w-28 bg-slate-200 dark:bg-slate-700 rounded skeleton mb-2"></div>
                        <!-- List Item 1 -->
                        <div class="flex gap-4 items-center">
                            <div class="size-10 rounded-full bg-slate-100 dark:bg-slate-800 skeleton shrink-0"></div>
                            <div class="flex flex-col gap-2 w-full">
                                <div class="h-3 w-[70%] bg-slate-200 dark:bg-slate-700 rounded skeleton"></div>
                                <div class="h-2 w-[40%] bg-slate-100 dark:bg-slate-800 rounded skeleton"></div>
                            </div>
                        </div>
                        <!-- List Item 2 -->
                        <div class="flex gap-4 items-center">
                            <div class="size-10 rounded-full bg-slate-100 dark:bg-slate-800 skeleton shrink-0"></div>
                            <div class="flex flex-col gap-2 w-full">
                                <div class="h-3 w-[80%] bg-slate-200 dark:bg-slate-700 rounded skeleton"></div>
                                <div class="h-2 w-[50%] bg-slate-100 dark:bg-slate-800 rounded skeleton"></div>
                            </div>
                        </div>
                        <!-- List Item 3 -->
                        <div class="flex gap-4 items-center">
                            <div class="size-10 rounded-full bg-slate-100 dark:bg-slate-800 skeleton shrink-0"></div>
                            <div class="flex flex-col gap-2 w-full">
                                <div class="h-3 w-[60%] bg-slate-200 dark:bg-slate-700 rounded skeleton"></div>
                                <div class="h-2 w-[30%] bg-slate-100 dark:bg-slate-800 rounded skeleton"></div>
                            </div>
                        </div>
                        <!-- List Item 4 -->
                        <div class="flex gap-4 items-center">
                            <div class="size-10 rounded-full bg-slate-100 dark:bg-slate-800 skeleton shrink-0"></div>
                            <div class="flex flex-col gap-2 w-full">
                                <div class="h-3 w-[75%] bg-slate-200 dark:bg-slate-700 rounded skeleton"></div>
                                <div class="h-2 w-[45%] bg-slate-100 dark:bg-slate-800 rounded skeleton"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Table Skeleton -->
                <div
                    class="rounded-xl border border-border-light dark:border-border-dark bg-white dark:bg-surface-dark shadow-sm p-6 flex flex-col gap-4">
                    <div class="flex justify-between items-center mb-2">
                        <div class="h-5 w-40 bg-slate-200 dark:bg-slate-700 rounded skeleton"></div>
                        <div class="h-8 w-24 bg-slate-100 dark:bg-slate-800 rounded-lg skeleton"></div>
                    </div>
                    <!-- Table Rows -->
                    <div class="space-y-4">
                        <div class="h-10 w-full bg-slate-50 dark:bg-slate-800/50 rounded skeleton"></div>
                        <div class="h-10 w-full bg-slate-50 dark:bg-slate-800/50 rounded skeleton"></div>
                        <div class="h-10 w-full bg-slate-50 dark:bg-slate-800/50 rounded skeleton"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
